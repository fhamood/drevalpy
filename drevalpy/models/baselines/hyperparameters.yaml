# Hyperparameters for the baseline models

# Naive Predictors: no hyperparameters
NaivePredictor:
NaiveDrugMeanPredictor:
NaiveCellLineMeanPredictor:
NaiveMeanEffectsPredictor:
NaiveTissueMeanPredictor:
NaiveTissueDrugMeanPredictor:

# Global single-omic sklearn models, input can be adjusted to omic of choice
ElasticNet:
  cell_line_views:
    - gene_expression
    - proteomics
  drug_views:
    - fingerprints
  l1_ratio:
    - 0
    - 0.5
    - 1
  alpha:
    - 1
    - 0.8
    - 0.6
    - 0.4
    - 0.2
    - 0.1
    - 5
    - 10
    - 100
  proteomics_feature_threshold:
    - 0.7
  proteomics_n_features:
    - 1000
  proteomics_normalization_width:
    - 0.3
  proteomics_normalization_downshift:
    - 1.8

RandomForest:
  cell_line_views:
    - gene_expression
    - proteomics
  drug_views:
    - fingerprints
  n_estimators:
    - 100
  max_depth:
    - 5
    - 10
    - 30
  max_samples:
    - 0.2
  n_jobs:
    - -1
  criterion:
    - squared_error

GradientBoosting:
  cell_line_views:
    - gene_expression
    - proteomics
  drug_views:
    - fingerprints
  max_iter:
    - 100
  learning_rate:
    - 0.1
    - 0.01
  max_depth:
    - 5
    - 10
    - 30

AdaBoostDecisionTree:
  cell_line_views:
    - gene_expression
    - proteomics
  drug_views:
    - fingerprints
  n_estimators:
    - 50
  max_depth:
    - 4
  min_samples_split:
    - 2
    - 6
  min_samples_leaf:
    - 1
    - 3

SVR:
  cell_line_views:
    - gene_expression
    - proteomics
  drug_views:
    - fingerprints
  kernel:
    - rbf
  C:
    - 0.001
    - 0.01
    - 0.1
    - 1
    - 10
    - 100
  epsilon:
    - 0.001
    - 0.01
    - 0.1
    - 0.5
    - 1
  max_iter:
    - 500

# Global multi-input sklearn models, input can be adjusted to omic list of choice
MultiFeatureRandomForest:
  cell_line_views:
    - - gene_expression
      - methylation
      - mutations
      - copy_number_variation_gistic
  drug_views:
    - fingerprints
  n_estimators:
    - 100
  max_depth:
    - 5
    - 10
    - 30
  max_samples:
    - 0.2
  n_jobs:
    - -1
  criterion:
    - squared_error
  methylation_n_components:
    - 100
  proteomics_feature_threshold:
    - 0.7
  proteomics_n_features:
    - 1000
  proteomics_normalization_width:
    - 0.3
  proteomics_normalization_downshift:
    - 1.8

# Single-drug single-omic sklearn models, input can be adjusted to omic of choice
SingleDrugRandomForest:
  cell_line_views:
    - gene_expression
    - proteomics
  n_estimators:
    - 100
  max_depth:
    - 5
    - 10
    - 30
  max_samples:
    - 0.2
  n_jobs:
    - -1
  criterion:
    - squared_error
  proteomics_feature_threshold:
    - 0.7
  proteomics_n_features:
    - 1000
  proteomics_normalization_width:
    - 0.3
  proteomics_normalization_downshift:
    - 1.8

SingleDrugElasticNet:
  cell_line_views:
    - gene_expression
    - proteomics
  l1_ratio:
    - 0.2
    - 0.5
    - 0.9
  alpha:
    - 1
    - 0.8
    - 0.6
    - 0.4
    - 0.2
    - 0.1
    - 5
    - 10
    - 100
  proteomics_feature_threshold:
    - 0.7
  proteomics_n_features:
    - 1000
  proteomics_normalization_width:
    - 0.3
  proteomics_normalization_downshift:
    - 1.8
